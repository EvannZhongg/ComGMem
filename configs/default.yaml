include:
  - models.yaml
  - node_labels.yaml

storage:
  backend: sqlite
  path: runs/comgmem/memory.sqlite3

logging:
  enabled: true

ingestion:
  pass_recent_context: false
  context_window_messages: 3

extraction:
  prompt: extraction/memory_extraction.md
  pass_node_labels_to_prompt: true

edge_clusters:
  enabled: true

maintenance:
  node_summary:
    enabled: true
    compact_after_k_sources: 10
    max_tokens: 2048
    prompt: maintenance/node_summary_compaction.md
  local_triples:
    enabled: true
    prompt: maintenance/local_triple_merge.md
  hyper_edge_description:
    enabled: true
    compact_after_k_sources: 10
    max_tokens: 2048
    prompt: maintenance/hyper_edge_description_compaction.md

index:
  lexical: sqlite_fts
  vector: qdrant
  use_embedding: true
  vector_store:
    backend: qdrant
    path: runs/comgmem/vector_index
    collection_name: comgmem_memory

retrieval:
  # Query analysis modes: false disables analysis for evaluation; "llm" uses prompts/retrieval/query_analysis.md; "nlp" uses optional spaCy processing.
  query_analysis: false
  node_rrf_k: 60
  edge_rrf_k: 60
  lexical_top_k: 30
  node_content_vector_top_k: 20
  node_local_graph_vector_top_k: 20
  hyper_edge_description_vector_top_k: 10
  graph_seed_top_k: 70
  edge_core_top_k: 10
  edge_coherence_alpha: 0.5
  edge_coherence_beta: 2.0
  final_top_k: 10

recall:
  cluster_periphery_edge_limit: 15
  cluster_periphery_node_limit: 50
  node_triple_limit: 30
  include_turn_ids_in_context: true
  include_real_time_in_context: false
