include:
  - models.yaml
  - node_labels.yaml

storage:
  backend: sqlite
  path: runs/c_hypermem/memory.sqlite3

default_top_k: 10
prompt_version: 0.1.0

nlp:
  # Optional spaCy model package name or local path. Relative paths are resolved from the current project working directory.
  model_path: models/en_core_web_sm

ingestion:
  event_mode: interaction
  context_window_messages: 3
  max_facts_per_event: 12
  extractor: null

extraction:
  prompt: extraction/memory_extraction.md
  output_schema: minimal_memory_candidates
  forbid_model_ids: true
  forbid_confidence: true
  pass_node_labels_to_prompt: true
  allow_unknown_node_labels: true

node_identity:
  strategy: canonical_fingerprint
  include_namespace: true
  include_node_labels: false
  disambiguation:
    enabled: true
    hint_sources: [aliases, local_graph, source_scope, metadata]

hyperedges:
  enabled: true
  build_from_extraction: true
  merge_policy: conservative
  member_policy_default: appendable
  resolution:
    use_member_overlap_as_recall_signal: true

edge_clusters:
  enabled: true
  create_from_related_hyperedges: true
  allow_conflict_clusters: true
  description_variants_limit: 8
  maintenance_prompts:
    fact_merge: maintenance/fact_merge.md
    contradiction_check: maintenance/contradiction_check.md
    edge_merge: maintenance/edge_merge.md
    edge_cluster_merge: maintenance/edge_cluster_merge.md
    edge_conflict_check: maintenance/edge_conflict_check.md
  background_maintenance:
    enabled: false
    trigger_every_k_writes: 100

local_graph:
  enabled: true
  schema: uniform
  configured_by_node_labels: true

time:
  relative_decay:
    enabled: true
    unit: turn
    decay_lambda: 0.03
    access_boost: 0.05

index:
  lexical: sqlite_fts
  vector: qdrant
  use_embedding: true
  vector_store:
    backend: qdrant
    path: runs/c_hypermem/vector_index
    collection_name: c_hypermem_memory

retrieval:
  # Query analysis modes: false disables analysis for evaluation; "llm" uses prompts/retrieval/query_analysis.md; "nlp" uses optional spaCy processing.
  query_analysis: false
  lexical_top_k: 30
  node_content_vector_top_k: 20
  node_local_graph_vector_top_k: 20
  node_summary_vector_top_k: 10
  graph_seed_top_k: 80
  edge_coherence_alpha: 0.5
  edge_coherence_beta: 2.0
  final_top_k: 10
