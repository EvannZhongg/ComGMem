llm:
  provider: openai_compatible
  model: ${COMGMEM_LLM_MODEL}
  base_url: ${COMGMEM_LLM_BASE_URL}
  api_key: ${COMGMEM_LLM_API_KEY}
  max_tokens: 32768
  retry_attempts: 5
  retry_backoff_base_sec: 2
  retry_backoff_max_sec: 60

embedding:
  provider: openai_compatible
  model: ${COMGMEM_EMBEDDING_MODEL}
  base_url: ${COMGMEM_EMBEDDING_BASE_URL}
  api_key: ${COMGMEM_EMBEDDING_API_KEY}
  max_tokens: 8192
  batch_size: 10
  retry_attempts: 5
  retry_backoff_base_sec: 2
  retry_backoff_max_sec: 60

token_counting:
  tokenizer_encoding: cl100k_base

nlp:
  # Optional spaCy model package name or local path. Relative paths are resolved from the current project working directory.
  model_path: models/en_core_web_sm
