llm:
  provider: openai_compatible
  model: ${CHYPERMEM_LLM_MODEL2}
  base_url: ${CHYPERMEM_LLM_BASE_URL2}
  api_key: ${CHYPERMEM_LLM_API_KEY2}
  retry_attempts: 5
  retry_backoff_base_sec: 2
  retry_backoff_max_sec: 60

embedding:
  provider: openai_compatible
  model: ${CHYPERMEM_EMBEDDING_MODEL}
  base_url: ${CHYPERMEM_EMBEDDING_BASE_URL}
  api_key: ${CHYPERMEM_EMBEDDING_API_KEY}
  batch_size: 10
  retry_attempts: 5
  retry_backoff_base_sec: 2
  retry_backoff_max_sec: 60

token_counting:
  tokenizer_encoding: cl100k_base

nlp:
  # Optional spaCy model package name or local path. Relative paths are resolved from the current project working directory.
  model_path: models/en_core_web_sm
